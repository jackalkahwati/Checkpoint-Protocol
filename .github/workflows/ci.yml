name: ci
on:
  push:
    branches: [ main ]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Tests
        run: python -m pytest -q
      - name: No-Git subset (git removed from PATH for the run)
        run: |
          python -m pytest -q -k "without_git or no_git or works_with_git_removed"
      - name: Release check (demos + smoke)
        run: bash scripts/release_check.sh
